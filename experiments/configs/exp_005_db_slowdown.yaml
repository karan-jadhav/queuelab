experiment_id: exp005_db_slowdown
description: Small DB write-delay sweep for backpressure and visibility behavior.
dataset:
  path: data/jobs_10k.jsonl
  expected_count: 10000
run:
  workers: 4
  batch_size: 10
backends:
  rabbitmq:
    prefetch_count: 10
  sqs:
    wait_seconds: 1
    visibility_timeout_seconds: 5
  postgres:
    lease_timeout_seconds: 5
chaos:
  db_delay_ms_values:
    - 0
    - 25
    - 100
